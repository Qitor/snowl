project:
  name: agentsafetybench-model-sweep
  root_dir: .

provider:
  id: openai
  kind: openai_compatible
  base_url: https://api.openai.com/v1
  api_key: sk-...
  timeout: 30
  max_retries: 2

agent_matrix:
  models:
    - id: gpt4o_mini
      model: gpt-4o-mini
    - id: qwen3_32b
      model: Qwen/Qwen3-32B

eval:
  benchmark: agentsafetybench
  code:
    base_dir: .
    task_module: ./task.py
    agent_module: ./agent.py
    scorer_module: ./scorer.py
  split: official

runtime:
  max_running_trials: 4
  max_container_slots: 0
  max_builds: 1
  max_scoring_tasks: 4
  provider_budgets:
    openai: 6

benchmarks:
  agentsafetybench:
    temperature: 0.6
    max_tokens: 8192
    max_rounds: 10
    allow_empty: false
    shield_model_path: thu-coai/ShieldAgent
    shield_model_base: qwen
    shield_batch_size: 1
